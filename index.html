<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #loading-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: Arial, sans-serif;
      }
      #loading-screen h2 {
        margin-bottom: 20px;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      #progress-bar-container {
        width: 60%;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        height: 8px;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 10px;
        transition: width 0.3s ease;
      }
      #progress-text {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <h2>Loading Experience</h2>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text">0%</div>
    </div>

    <a-scene 
          mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01;"
          gltf-model="dracoDecoderPath: https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/libs/draco/gltf/"
          color-space="sRGB" 
          renderer="colorManagement: true, physicallyCorrectLights"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">
      <a-assets id="assets" timeout="60000">
        <a-asset-item id="interiorModel" src="./Interior_Optim.glb"></a-asset-item>
        <a-asset-item id="exteriorModel" src="./Exterior.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="0 -90 -90" position="0 0 0" scale="0.1 0.1 0.1" src="#interiorModel"></a-gltf-model>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model rotation="10 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="#exteriorModel"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const loadingScreen = document.getElementById('loading-screen');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');

      const assets = [
        document.getElementById('interiorModel'),
        document.getElementById('exteriorModel')
      ];

      let loaded = 0;
      let fakeProgress = 0;
      let fakeInterval;

      // Fake progress crawls to 90% while real assets load
      fakeInterval = setInterval(() => {
        const target = loaded === 0 ? 40 : loaded === 1 ? 85 : 90;
        if (fakeProgress < target) {
          fakeProgress += 0.5;
          progressBar.style.width = fakeProgress + '%';
          progressText.textContent = Math.round(fakeProgress) + '%';
        }
      }, 100);

      function onAssetLoaded() {
        loaded++;
        if (loaded === assets.length) {
          // All done — jump to 100% and hide
          clearInterval(fakeInterval);
          fakeProgress = 100;
          progressBar.style.width = '100%';
          progressText.textContent = '100%';
          setTimeout(() => {
            loadingScreen.style.transition = 'opacity 0.5s ease';
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 500);
          }, 400);
        }
      }

      assets.forEach(asset => {
        asset.addEventListener('loaded', onAssetLoaded);
        asset.addEventListener('error', onAssetLoaded);
      });
    </script>
  </body>
</html>
